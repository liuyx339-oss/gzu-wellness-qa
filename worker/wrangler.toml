# Cloudflare Worker 配置
name = "gzu-wellness-qa"
main = "index.js"
compatibility_date = "2024-12-01"

# 环境变量（部署前修改）
# 也可以在 Cloudflare Dashboard > Workers > Settings > Variables 中设置
[vars]
AI_PROVIDER = "openai"
CHUNKS_URL = "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/data/chunks.json"

# 敏感信息用 secret 存储（不要明文写在这里）:
# wrangler secret put AI_API_KEY
