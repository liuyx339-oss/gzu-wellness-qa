name: 知识库每日同步

on:
  schedule:
    # 每天 UTC 2:00 = 北京时间 10:00
    - cron: '0 2 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 push 回仓库

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests openai tiktoken

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lark-cli
        run: npm install -g lark-cli

      - name: Configure lark-cli
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          lark-cli config init --app-id "$FEISHU_APP_ID" --app-secret "$FEISHU_APP_SECRET" --non-interactive || true

      - name: Run sync script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: bash scripts/sync.sh

      - name: 🔒 强制从MD源文件重建chunks.json(防乱码)
        run: |
          node -e "
          const fs = require('fs'), path = require('path');
          const dir = 'data/docs';
          if(!fs.existsSync(dir)) process.exit(0);
          const files = fs.readdirSync(dir).filter(f=>f.endsWith('.md')).sort();
          const chunks = []; let id = 0;
          files.forEach(file => {
            const text = fs.readFileSync(path.join(dir,file),'utf-8');
            const sections = text.split(/\\n(?=## )/);
            sections.forEach(sec => {
              sec = sec.trim();
              if(sec.length > 30) chunks.push({id:id++,title:file.replace('.md',''),content:sec.substring(0,2500),tokens_est:Math.floor(sec.length/2)});
            });
          });
          fs.writeFileSync('data/chunks.json', JSON.stringify(chunks,null,2), 'utf-8');
          const v = JSON.parse(fs.readFileSync('data/chunks.json','utf-8'));
          const good = v.filter(c=>/[\\u4e00-\\u9fff]/.test(c.content)).length;
          if(good < v.length * 0.5) throw new Error('chunks.json 中文异常: '+good+'/'+v.length);
          console.log('chunks.json rebuilt: '+v.length+' chunks, chinese OK: '+good);
          "

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (
            git commit -m "📚 每日知识库同步 $(date +%Y-%m-%d)" &&
            git push
          )
